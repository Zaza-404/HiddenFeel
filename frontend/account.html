<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiddenFeel · Akun Saya</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .profile-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent), #c06840);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 16px;
        }
        .profile-name {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .profile-username {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text2);
            margin-bottom: 20px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .info-label {
            font-weight: 600;
            color: var(--text2);
        }
        .info-value {
            color: var(--text);
        }
        .edit-form {
            margin-top: 20px;
            display: none;
        }
        .edit-form.show {
            display: block;
        }
        .btn-small {
            background: var(--accent);
            border: none;
            border-radius: 50px;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-secondary {
            background: var(--bg3);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .stats-mini {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .stat-mini-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: var(--bg3);
            border-radius: 12px;
        }
        .stat-mini-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-mini-label {
            font-size: 0.7rem;
            color: var(--text2);
        }
        .error-msg, .success-msg {
            padding: 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-bottom: 15px;
            display: none;
        }
        .error-msg { background: #fee; color: #c0392b; }
        .success-msg { background: #e8f5e9; color: #2e7d32; }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text2);
        }
        .input-group input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text);
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <a href="today.html" class="logo">Hidden<span>Feel</span></a>
        <div class="header-actions">
            <div class="streak-pill">🔥 <span id="streakVal">0</span> hari</div>
            <button class="theme-btn" id="themeToggle" title="Ganti tema">🌙</button>
        </div>
    </div>

    <div class="card">
        <div class="profile-avatar" id="avatarDisplay">😊</div>
        <div class="profile-name" id="fullnameDisplay">-</div>
        <div class="profile-username" id="usernameDisplay">@username</div>
        
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
        
        <div class="info-row">
            <span class="info-label">Nama</span>
            <span class="info-value" id="infoName">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Email</span>
            <span class="info-value" id="infoEmail">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Bergabung Sejak</span>
            <span class="info-value" id="infoJoined">-</span>
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;">
            <button class="btn-small" id="editProfileBtn">✏️ Edit Profil</button>
            <button class="btn-small btn-secondary" id="changePasswordBtn">🔒 Ganti Password</button>
            <button class="btn-danger" id="logoutBtn">🚪 Keluar</button>
        </div>
        
        <!-- Edit Profile Form -->
        <div id="editForm" class="edit-form">
            <h4 style="margin-bottom: 15px;">Edit Profil</h4>
            <div class="input-group">
                <label>Nama</label>
                <input type="text" id="editName" placeholder="Nama lengkap">
            </div>
            <button class="btn-small" id="saveProfileBtn">💾 Simpan</button>
            <button class="btn-small btn-secondary" id="cancelEditBtn">Batal</button>
        </div>
        
        <!-- Change Password Form -->
        <div id="passwordForm" class="edit-form">
            <h4 style="margin-bottom: 15px;">Ganti Password</h4>
            <div class="input-group">
                <label>Password Baru</label>
                <input type="password" id="newPassword" placeholder="Minimal 6 karakter">
            </div>
            <button class="btn-small" id="savePasswordBtn">💾 Simpan Password</button>
            <button class="btn-small btn-secondary" id="cancelPasswordBtn">Batal</button>
        </div>
        
        <!-- Mini Stats -->
        <div class="stats-mini">
            <div class="stat-mini-item">
                <div class="stat-mini-number" id="statTotal">0</div>
                <div class="stat-mini-label">Total Entri</div>
            </div>
            <div class="stat-mini-item">
                <div class="stat-mini-number" id="statAvg">0</div>
                <div class="stat-mini-label">Rata-rata Mood</div>
            </div>
            <div class="stat-mini-item">
                <div class="stat-mini-number" id="statStreak">0</div>
                <div class="stat-mini-label">Streak</div>
            </div>
        </div>
    </div>

    <footer>Bukan alat diagnosis medis. Jaga kesehatan mentalmu 💚</footer>
</div>

<nav class="bottom-nav">
    <a href="today.html" class="nav-item">
        <span class="nav-icon">📝</span>Hari Ini
    </a>
    <a href="stats.html" class="nav-item">
        <span class="nav-icon">📊</span>Statistik
    </a>
    <a href="history.html" class="nav-item">
        <span class="nav-icon">📜</span>Riwayat
    </a>
    <a href="calendar.html" class="nav-item">
        <span class="nav-icon">📅</span>Kalender
    </a>
    <a href="insight.html" class="nav-item">
        <span class="nav-icon">✦</span>AI
    </a>
</nav>

<script>
// ============ CONFIG ============
const API_BASE = 'http://localhost:3000/api';

// ============ AUTH ============
function getToken() {
    return localStorage.getItem('token');
}

function getUser() {
    const userStr = localStorage.getItem('user');
    return userStr ? JSON.parse(userStr) : null;
}

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'login.html';
}

async function checkAuth() {
    const token = getToken();
    if (!token) {
        window.location.href = 'login.html';
        return false;
    }
    return true;
}

// ============ API ============
async function apiFetch(endpoint, options = {}) {
    const token = getToken();
    const headers = {
        'Content-Type': 'application/json',
        ...options.headers,
        'Authorization': `Bearer ${token}`
    };
    
    const response = await fetch(`${API_BASE}${endpoint}`, {
        ...options,
        headers
    });
    
    if (response.status === 401) {
        logout();
        throw new Error('Sesi habis');
    }
    
    return response.json();
}

async function fetchEntries() {
    return await apiFetch('/entries');
}

async function updateProfile(data) {
    return await apiFetch('/auth/me', {
        method: 'PUT',
        body: JSON.stringify(data)
    });
}

async function getStats() {
    return await apiFetch('/stats');
}

// ============ UTILITIES ============
function calcStreak(entries) {
    if (!entries || entries.length === 0) return 0;
    
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    const entryDates = new Set();
    entries.forEach(e => {
        const date = new Date(e.created_at);
        date.setHours(0, 0, 0, 0);
        entryDates.add(date.getTime());
    });
    
    let streak = 0;
    let checkDate = new Date(today);
    
    while (entryDates.has(checkDate.getTime())) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
    }
    
    return streak;
}

// ============ LOAD DATA ============
let userData = null;

async function loadUserData() {
    userData = getUser();
    if (!userData) {
        await checkAuth();
        userData = getUser();
    }
    
    document.getElementById('infoName').textContent = userData.name || '-';
    document.getElementById('infoEmail').textContent = userData.email || '-';
    document.getElementById('fullnameDisplay').textContent = userData.name || 'Pengguna';
    document.getElementById('usernameDisplay').textContent = '@' + (userData.email ? userData.email.split('@')[0] : 'user');
    
    const joinedDate = userData.created_at ? new Date(userData.created_at).toLocaleDateString('id-ID', {
        day: 'numeric',
        month: 'long',
        year: 'numeric'
    }) : '-';
    document.getElementById('infoJoined').textContent = joinedDate;
    
    // Load stats
    try {
        const entriesData = await fetchEntries();
        const streak = calcStreak(entriesData);
        const avgMood = entriesData.length ? 
            (entriesData.reduce((a, e) => a + (e.mood_val || 3), 0) / entriesData.length).toFixed(1) : 0;
        
        document.getElementById('statTotal').textContent = entriesData.length;
        document.getElementById('statAvg').textContent = avgMood;
        document.getElementById('statStreak').textContent = streak;
        document.getElementById('streakVal').textContent = streak;
    } catch (error) {
        console.error('Failed to load stats:', error);
    }
}

// ============ THEME ============
function initTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    }
    
    const themeBtn = document.getElementById('themeToggle');
    if (themeBtn) {
        themeBtn.textContent = document.documentElement.hasAttribute('data-theme') ? '☀️' : '🌙';
        themeBtn.addEventListener('click', () => {
            document.documentElement.toggleAttribute('data-theme');
            const isDark = document.documentElement.hasAttribute('data-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeBtn.textContent = isDark ? '☀️' : '🌙';
        });
    }
}

// ============ EVENTS ============
// Edit Profile
document.getElementById('editProfileBtn').onclick = () => {
    document.getElementById('editForm').classList.add('show');
    document.getElementById('passwordForm').classList.remove('show');
    document.getElementById('editName').value = userData.name || '';
};

document.getElementById('cancelEditBtn').onclick = () => {
    document.getElementById('editForm').classList.remove('show');
};

document.getElementById('saveProfileBtn').onclick = async () => {
    const name = document.getElementById('editName').value.trim();
    
    if (!name) {
        showError('Nama tidak boleh kosong');
        return;
    }
    
    try {
        const result = await updateProfile({ name });
        if (result.success) {
            showSuccess('Profil berhasil diperbarui!');
            localStorage.setItem('user', JSON.stringify(result.user));
            userData = result.user;
            document.getElementById('fullnameDisplay').textContent = name;
            document.getElementById('infoName').textContent = name;
            document.getElementById('editForm').classList.remove('show');
        }
    } catch (error) {
        showError(error.message || 'Gagal menyimpan');
    }
};

// Change Password
document.getElementById('changePasswordBtn').onclick = () => {
    document.getElementById('passwordForm').classList.add('show');
    document.getElementById('editForm').classList.remove('show');
    document.getElementById('newPassword').value = '';
};

document.getElementById('cancelPasswordBtn').onclick = () => {
    document.getElementById('passwordForm').classList.remove('show');
};

document.getElementById('savePasswordBtn').onclick = async () => {
    const newPassword = document.getElementById('newPassword').value;
    
    if (newPassword.length < 6) {
        showError('Password minimal 6 karakter');
        return;
    }
    
    try {
        const result = await updateProfile({ password: newPassword });
        if (result.success) {
            showSuccess('Password berhasil diganti!');
            document.getElementById('passwordForm').classList.remove('show');
        }
    } catch (error) {
        showError(error.message || 'Gagal mengganti password');
    }
};

// Logout
document.getElementById('logoutBtn').onclick = logout;

// ============ TOAST ============
function showError(message) {
    const el = document.getElementById('errorMsg');
    el.textContent = message;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function showSuccess(message) {
    const el = document.getElementById('successMsg');
    el.textContent = message;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// ============ INIT ============
async function init() {
    if (!await checkAuth()) return;
    initTheme();
    await loadUserData();
}

init();
</script>
</body>
</html>
