<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiddenFeel · Kalender Mood</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .month-nav {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .month-nav button {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
        }
        .month-nav button:hover {
            background: var(--warm);
        }
        .month-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 600;
        }
        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 10px;
        }
        .weekday {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text2);
            padding: 8px 0;
        }
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .calendar-day {
            aspect-ratio: 1;
            background: var(--bg3);
            border-radius: 12px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            position: relative;
        }
        .calendar-day:hover {
            transform: scale(1.05);
            background: var(--warm);
        }
        .calendar-day.empty {
            background: transparent;
            border-color: transparent;
            cursor: default;
        }
        .calendar-day.empty:hover {
            transform: none;
            background: transparent;
        }
        .day-number {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .day-mood {
            font-size: 1.2rem;
        }
        .day-intensity {
            font-size: 0.6rem;
            color: var(--text2);
            margin-top: 2px;
        }
        .calendar-day.today {
            border-color: var(--accent);
            background: var(--warm);
        }
        .calendar-day.has-mood {
            border-color: var(--accent2);
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
        .selected-day-info {
            margin-top: 20px;
            padding: 15px;
            background: var(--bg3);
            border-radius: 16px;
            display: none;
        }
        .selected-day-info.show {
            display: block;
        }
        .mood-stats-summary {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .mood-stat-badge {
            background: var(--bg2);
            border-radius: 50px;
            padding: 5px 12px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <a href="today.html" class="logo">Hidden<span>Feel</span></a>
        <div class="header-actions">
            <div class="streak-pill">🔥 <span id="streakVal">0</span> hari</div>
            <button class="theme-btn" id="themeToggle" title="Ganti tema">🌙</button>
        </div>
    </div>

    <div class="card">
        <div class="calendar-header">
            <div class="month-nav">
                <button id="prevMonth">←</button>
                <span class="month-title" id="monthTitle">Januari 2024</span>
                <button id="nextMonth">→</button>
            </div>
        </div>
        
        <div class="calendar-weekdays">
            <div class="weekday">Min</div>
            <div class="weekday">Sen</div>
            <div class="weekday">Sel</div>
            <div class="weekday">Rab</div>
            <div class="weekday">Kam</div>
            <div class="weekday">Jum</div>
            <div class="weekday">Sab</div>
        </div>
        
        <div class="calendar-days" id="calendarDays"></div>
        
        <div class="legend">
            <div class="legend-item"><div class="legend-color" style="background: #a8c96a;"></div><span>Bahagia (5)</span></div>
            <div class="legend-item"><div class="legend-color" style="background: #a8c5a0;"></div><span>Tenang (4)</span></div>
            <div class="legend-item"><div class="legend-color" style="background: #c0b898;"></div><span>Biasa (3)</span></div>
            <div class="legend-item"><div class="legend-color" style="background: #d0a070;"></div><span>Cemas/Sedih (2)</span></div>
            <div class="legend-item"><div class="legend-color" style="background: #c08080;"></div><span>Marah/Stres (1)</span></div>
        </div>
    </div>

    <div class="card" id="selectedDayInfo" style="display: none;">
        <div class="card-title" id="selectedDayTitle">📅</div>
        <div id="selectedDayDetail"></div>
    </div>

    <div class="card">
        <div class="card-title">📊 Ringkasan Bulan Ini</div>
        <div class="stats-row" style="margin-top: 12px;">
            <div class="stat-card">
                <div class="stat-num" id="monthTotal">0</div>
                <div class="stat-lbl">Total Entri</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="monthAvg">0</div>
                <div class="stat-lbl">Rata-rata Mood</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="monthBest">😊</div>
                <div class="stat-lbl">Mood Terbanyak</div>
            </div>
        </div>
        <div class="mood-stats-summary" id="moodStatsSummary"></div>
    </div>

    <footer>Klik tanggal untuk melihat detail catatan</footer>
</div>

<nav class="bottom-nav">
    <a href="today.html" class="nav-item">
        <span class="nav-icon">📝</span>Hari Ini
    </a>
    <a href="stats.html" class="nav-item">
        <span class="nav-icon">📊</span>Statistik
    </a>
    <a href="history.html" class="nav-item">
        <span class="nav-icon">📜</span>Riwayat
    </a>
    <a href="calendar.html" class="nav-item active">
        <span class="nav-icon">📅</span>Kalender
    </a>
    <a href="insight.html" class="nav-item">
        <span class="nav-icon">✦</span>AI
    </a>
</nav>

<script src="js/common.js"></script>
<script>
let currentDate = new Date();
let entriesData = [];

async function loadCalendarData() {
    entriesData = await fetchEntries();
    renderCalendar();
    updateMonthSummary();
    updateStreakDisplay();
}

function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startDayOfWeek = firstDay.getDay(); // 0 = Minggu
    const daysInMonth = lastDay.getDate();
    
    document.getElementById('monthTitle').textContent = firstDay.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
    
    const calendarDiv = document.getElementById('calendarDays');
    calendarDiv.innerHTML = '';
    
    // Empty cells for days before month starts
    for (let i = 0; i < startDayOfWeek; i++) {
        const emptyDiv = document.createElement('div');
        emptyDiv.className = 'calendar-day empty';
        calendarDiv.appendChild(emptyDiv);
    }
    
    // Days of the month
    const today = new Date();
    const todayStr = today.toISOString().slice(0, 10);
    
    for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const entry = entriesData.find(e => e.date === dateStr);
        const isToday = dateStr === todayStr;
        
        const dayDiv = document.createElement('div');
        dayDiv.className = `calendar-day ${isToday ? 'today' : ''} ${entry ? 'has-mood' : ''}`;
        dayDiv.innerHTML = `
            <div class="day-number">${day}</div>
            <div class="day-mood">${entry ? entry.moodEmoji : '📅'}</div>
            ${entry && entry.intensity ? `<div class="day-intensity">${'⚡'.repeat(entry.intensity)}</div>` : ''}
        `;
        dayDiv.onclick = () => showDayDetail(dateStr, entry);
        calendarDiv.appendChild(dayDiv);
    }
}

function showDayDetail(dateStr, entry) {
    const detailCard = document.getElementById('selectedDayInfo');
    const titleEl = document.getElementById('selectedDayTitle');
    const detailEl = document.getElementById('selectedDayDetail');
    
    const date = new Date(dateStr);
    const formattedDate = date.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    
    if (entry) {
        titleEl.innerHTML = `📅 ${formattedDate}`;
        detailEl.innerHTML = `
            <div style="text-align: center; padding: 10px;">
                <div style="font-size: 3rem; margin-bottom: 10px;">${entry.moodEmoji}</div>
                <div style="font-size: 1.2rem; font-weight: 600; margin-bottom: 5px;">${entry.moodName}</div>
                <div style="font-size: 0.8rem; color: var(--text2); margin-bottom: 10px;">
                    Intensitas: ${'⚡'.repeat(entry.intensity)} (${entry.intensity}/5)
                </div>
                ${entry.energy ? `<div style="font-size: 0.85rem; margin-bottom: 8px;">🔋 ${entry.energy}</div>` : ''}
                ${entry.triggers && entry.triggers.length ? `<div style="font-size: 0.8rem; margin-bottom: 8px;">🎯 Trigger: ${entry.triggers.join(', ')}</div>` : ''}
                ${entry.note ? `<div style="font-size: 0.85rem; background: var(--bg3); padding: 10px; border-radius: 12px; margin-top: 10px;">📝 "${entry.note}"</div>` : ''}
            </div>
        `;
    } else {
        titleEl.innerHTML = `📅 ${formattedDate}`;
        detailEl.innerHTML = `
            <div style="text-align: center; padding: 20px;">
                <div style="font-size: 2rem; margin-bottom: 10px;">📭</div>
                <div style="margin-bottom: 10px;">Belum ada catatan untuk hari ini</div>
                <a href="today.html" class="btn-save" style="display: inline-block; width: auto; padding: 10px 20px;">📝 Buat Catatan</a>
            </div>
        `;
    }
    
    detailCard.style.display = 'block';
}

function updateMonthSummary() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    
    const monthEntries = entriesData.filter(e => {
        const [y, m] = e.date.split('-');
        return parseInt(y) === year && parseInt(m) === month + 1;
    });
    
    document.getElementById('monthTotal').textContent = monthEntries.length;
    
    if (monthEntries.length > 0) {
        const avg = (monthEntries.reduce((a, e) => a + e.moodVal, 0) / monthEntries.length).toFixed(1);
        document.getElementById('monthAvg').textContent = avg;
        
        // Most frequent mood
        const moodFreq = {};
        monthEntries.forEach(e => { moodFreq[e.moodName] = (moodFreq[e.moodName] || 0) + 1; });
        const topMood = Object.entries(moodFreq).sort((a, b) => b[1] - a[1])[0];
        const topMoodData = MOODS.find(m => m.name === topMood?.[0]);
        document.getElementById('monthBest').innerHTML = topMoodData ? `${topMoodData.emoji} ${topMood[0]}` : '😊';
        
        // Mood stats summary
        const summaryDiv = document.getElementById('moodStatsSummary');
        summaryDiv.innerHTML = '';
        const sortedMoods = Object.entries(moodFreq).sort((a, b) => b[1] - a[1]).slice(0, 5);
        sortedMoods.forEach(([name, count]) => {
            const mood = MOODS.find(m => m.name === name);
            if (mood) {
                summaryDiv.innerHTML += `<div class="mood-stat-badge">${mood.emoji} ${name} ${count}x</div>`;
            }
        });
    } else {
        document.getElementById('monthAvg').textContent = '0';
        document.getElementById('monthBest').innerHTML = '😊';
        document.getElementById('moodStatsSummary').innerHTML = '<div class="empty-text">Belum ada data bulan ini</div>';
    }
}

// Navigation
document.getElementById('prevMonth').onclick = () => {
    currentDate.setMonth(currentDate.getMonth() - 1);
    loadCalendarData();
};

document.getElementById('nextMonth').onclick = () => {
    currentDate.setMonth(currentDate.getMonth() + 1);
    loadCalendarData();
};

// Init
initTheme();
loadCalendarData();
setActiveNav();
addLogoutButton();
</script>
</body>
</html>
