<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiddenFeel · Kalender Mood</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<div class="app">
    <div class="header">
        <a href="today.html" class="logo">Hidden<span>Feel</span></a>
        <div class="header-actions">
            <div class="streak-pill">🔥 <span id="streakVal">0</span> hari</div>
            <button class="theme-btn" id="themeToggle" title="Ganti tema">🌙</button>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <button id="prevMonth" style="background: var(--bg3); border: 1px solid var(--border); border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 1.2rem;">◀</button>
            <span id="monthTitle" style="font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 600;">Januari 2024</span>
            <button id="nextMonth" style="background: var(--bg3); border: 1px solid var(--border); border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 1.2rem;">▶</button>
        </div>
        
        <div style="display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 8px;">
            <div style="font-size: 0.75rem; font-weight: 600; color: var(--text2); padding: 4px 0;">Min</div>
            <div style="font-size: 0.75rem; font-weight: 600; color: var(--text2); padding: 4px 0;">Sen</div>
            <div style="font-size: 0.75rem; font-weight: 600; color: var(--text2); padding: 4px 0;">Sel</div>
            <div style="font-size: 0.75rem; font-weight: 600; color: var(--text2); padding: 4px 0;">Rab</div>
            <div style="font-size: 0.75rem; font-weight: 600; color: var(--text2); padding: 4px 0;">Kam</div>
            <div style="font-size: 0.75rem; font-weight: 600; color: var(--text2); padding: 4px 0;">Jum</div>
            <div style="font-size: 0.75rem; font-weight: 600; color: var(--text2); padding: 4px 0;">Sab</div>
        </div>
        
        <div id="calendarDays" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;"></div>
        
        <div style="display: flex; justify-content: center; gap: 12px; margin-top: 16px; flex-wrap: wrap;">
            <div style="display: flex; align-items: center; gap: 4px; font-size: 0.7rem;">
                <span style="width: 12px; height: 12px; border-radius: 3px; background: #a8c96a;"></span> Bahagia
            </div>
            <div style="display: flex; align-items: center; gap: 4px; font-size: 0.7rem;">
                <span style="width: 12px; height: 12px; border-radius: 3px; background: #a8c5a0;"></span> Tenang
            </div>
            <div style="display: flex; align-items: center; gap: 4px; font-size: 0.7rem;">
                <span style="width: 12px; height: 12px; border-radius: 3px; background: #c0b898;"></span> Biasa
            </div>
            <div style="display: flex; align-items: center; gap: 4px; font-size: 0.7rem;">
                <span style="width: 12px; height: 12px; border-radius: 3px; background: #d0a070;"></span> Sedih
            </div>
            <div style="display: flex; align-items: center; gap: 4px; font-size: 0.7rem;">
                <span style="width: 12px; height: 12px; border-radius: 3px; background: #c08080;"></span> Marah
            </div>
        </div>
    </div>

    <div id="selectedDayInfo" class="card" style="display: none;">
        <div class="card-title" id="selectedDayTitle">📅</div>
        <div id="selectedDayDetail"></div>
    </div>

    <footer>Klik tanggal untuk melihat detail catatan</footer>
</div>

<nav class="bottom-nav">
    <a href="today.html" class="nav-item">
        <span class="nav-icon">📝</span>Hari Ini
    </a>
    <a href="stats.html" class="nav-item">
        <span class="nav-icon">📊</span>Statistik
    </a>
    <a href="history.html" class="nav-item">
        <span class="nav-icon">📜</span>Riwayat
    </a>
    <a href="calendar.html" class="nav-item active">
        <span class="nav-icon">📅</span>Kalender
    </a>
    <a href="insight.html" class="nav-item">
        <span class="nav-icon">✦</span>AI
    </a>
</nav>

<script>
// ============ CONFIG ============
const API_BASE = 'http://localhost:3000/api';

const MOOD_COLORS = {
    '😊': '#a8c96a',
    '😌': '#a8c5a0',
    '😐': '#c0b898',
    '😢': '#d0a070',
    '😡': '#c08080'
};

// ============ AUTH ============
function getToken() {
    return localStorage.getItem('token');
}

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'login.html';
}

async function checkAuth() {
    const token = getToken();
    if (!token) {
        window.location.href = 'login.html';
        return false;
    }
    return true;
}

// ============ API ============
async function apiFetch(endpoint, options = {}) {
    const token = getToken();
    const headers = {
        'Content-Type': 'application/json',
        ...options.headers,
        'Authorization': `Bearer ${token}`
    };
    
    const response = await fetch(`${API_BASE}${endpoint}`, {
        ...options,
        headers
    });
    
    if (response.status === 401) {
        logout();
        throw new Error('Sesi habis');
    }
    
    return response.json();
}

async function fetchEntries() {
    return await apiFetch('/entries');
}

// ============ STATE ============
let currentDate = new Date();
let entriesData = [];

function getMoodValue(emoji) {
    const map = {
        '😊': 5,
        '😌': 4,
        '😐': 3,
        '😢': 2,
        '😡': 1
    };
    return map[emoji] || 3;
}

function getMoodName(value) {
    const map = {
        5: 'Bahagia',
        4: 'Tenang',
        3: 'Biasa',
        2: 'Sedih',
        1: 'Marah'
    };
    return map[value] || 'Biasa';
}

// ============ THEME ============
function initTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    }
    
    const themeBtn = document.getElementById('themeToggle');
    if (themeBtn) {
        themeBtn.textContent = document.documentElement.hasAttribute('data-theme') ? '☀️' : '🌙';
        themeBtn.addEventListener('click', () => {
            document.documentElement.toggleAttribute('data-theme');
            const isDark = document.documentElement.hasAttribute('data-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeBtn.textContent = isDark ? '☀️' : '🌙';
        });
    }
}

// ============ RENDER ============
function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startDayOfWeek = firstDay.getDay();
    const daysInMonth = lastDay.getDate();
    
    document.getElementById('monthTitle').textContent = firstDay.toLocaleDateString('id-ID', { 
        month: 'long', 
        year: 'numeric' 
    });
    
    const calendarDiv = document.getElementById('calendarDays');
    calendarDiv.innerHTML = '';
    
    // Empty cells for days before month starts
    for (let i = 0; i < startDayOfWeek; i++) {
        const emptyDiv = document.createElement('div');
        emptyDiv.style.cssText = 'aspect-ratio: 1; background: transparent; border-radius: 8px;';
        calendarDiv.appendChild(emptyDiv);
    }
    
    // Days of the month
    const today = new Date();
    const todayStr = today.toISOString().slice(0, 10);
    
    for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const entry = entriesData.find(e => {
            const eDate = new Date(e.created_at);
            const eStr = `${eDate.getFullYear()}-${String(eDate.getMonth() + 1).padStart(2, '0')}-${String(eDate.getDate()).padStart(2, '0')}`;
            return eStr === dateStr;
        });
        const isToday = dateStr === todayStr;
        
        const dayDiv = document.createElement('div');
        const moodValue = entry ? getMoodValue(entry.mood) : null;
        const color = entry ? MOOD_COLORS[entry.mood] || '#c0b898' : 'var(--bg3)';
        
        dayDiv.style.cssText = `
            aspect-ratio: 1;
            background: ${isToday ? 'var(--warm)' : 'var(--bg3)'};
            border-radius: 8px;
            padding: 4px;
            text-align: center;
            cursor: ${entry ? 'pointer' : 'default'};
            border: ${isToday ? '2px solid var(--accent)' : '1px solid var(--border)'};
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        `;
        
        if (entry) {
            dayDiv.style.borderColor = color;
            dayDiv.style.borderWidth = '2px';
        }
        
        dayDiv.innerHTML = `
            <div style="font-size: 0.8rem; font-weight: 600;">${day}</div>
            <div style="font-size: 1.2rem;">${entry ? entry.mood : ''}</div>
        `;
        
        if (entry) {
            dayDiv.onclick = () => showDayDetail(dateStr, entry);
        }
        
        calendarDiv.appendChild(dayDiv);
    }
}

function showDayDetail(dateStr, entry) {
    const detailCard = document.getElementById('selectedDayInfo');
    const titleEl = document.getElementById('selectedDayTitle');
    const detailEl = document.getElementById('selectedDayDetail');
    
    const date = new Date(dateStr);
    const formattedDate = date.toLocaleDateString('id-ID', { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
    });
    
    const moodValue = getMoodValue(entry.mood);
    const moodName = getMoodName(moodValue);
    const intensity = entry.intensity || 3;
    
    titleEl.innerHTML = `📅 ${formattedDate}`;
    detailEl.innerHTML = `
        <div style="text-align: center; padding: 10px;">
            <div style="font-size: 3rem; margin-bottom: 10px;">${entry.mood || '😐'}</div>
            <div style="font-size: 1.2rem; font-weight: 600; margin-bottom: 5px;">${moodName}</div>
            <div style="font-size: 0.8rem; color: var(--text2); margin-bottom: 10px;">
                Intensitas: ${'⚡'.repeat(intensity)} (${intensity}/5)
            </div>
            <div style="font-size: 0.85rem; background: var(--bg3); padding: 10px; border-radius: 12px; margin-top: 10px;">
                📝 "${entry.feeling_text || entry.note || 'Tidak ada catatan'}"
            </div>
        </div>
    `;
    
    detailCard.style.display = 'block';
}

// ============ NAVIGATION ============
document.getElementById('prevMonth').onclick = () => {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
};

document.getElementById('nextMonth').onclick = () => {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
};

// ============ STREAK ============
function calcStreak(entries) {
    if (!entries || entries.length === 0) return 0;
    
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    const entryDates = new Set();
    entries.forEach(e => {
        const date = new Date(e.created_at);
        date.setHours(0, 0, 0, 0);
        entryDates.add(date.getTime());
    });
    
    let streak = 0;
    let checkDate = new Date(today);
    
    while (entryDates.has(checkDate.getTime())) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
    }
    
    return streak;
}

// ============ INIT ============
async function init() {
    if (!await checkAuth()) return;
    initTheme();
    
    try {
        entriesData = await fetchEntries();
        document.getElementById('streakVal').textContent = calcStreak(entriesData);
        renderCalendar();
    } catch (error) {
        console.error('Failed to load calendar data:', error);
    }
}

init();
</script>
</body>
</html>
