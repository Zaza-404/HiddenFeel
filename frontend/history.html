<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiddenFeel · Riwayat</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="/assets/js/theme.js"></script>
</head>
<body>

<div class="app">
    <div class="header">
        <a href="today.html" class="logo">Hidden<span>Feel</span></a>
        <div class="header-actions">
            <div class="streak-pill">🔥 <span id="streakVal">0</span> hari</div>
            <button class="theme-btn" id="themeToggle" title="Ganti tema">🌙</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="card-title">📜 Semua Catatan</div>
            <div style="font-size:0.75rem;color:var(--text2);" id="historyCount">0 entri</div>
        </div>
        <div id="historyList"></div>
    </div>

    <footer>Bukan alat diagnosis medis. Jaga kesehatan mentalmu 💚</footer>
</div>

<nav class="bottom-nav">
    <a href="today.html" class="nav-item">
        <span class="nav-icon">📝</span>Hari Ini
    </a>
    <a href="stats.html" class="nav-item">
        <span class="nav-icon">📊</span>Statistik
    </a>
    <a href="history.html" class="nav-item active">
        <span class="nav-icon">📜</span>Riwayat
    </a>
    <a href="calendar.html" class="nav-item">
        <span class="nav-icon">📅</span>Kalender
    </a>
    <a href="insight.html" class="nav-item">
        <span class="nav-icon">✦</span>AI
    </a>
</nav>

<script>
// ============ CONFIG ============
const API_BASE = 'http://localhost:3000/api';

// ============ AUTH ============
function getToken() {
    return localStorage.getItem('token');
}

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'login.html';
}

async function checkAuth() {
    const token = getToken();
    if (!token) {
        window.location.href = 'login.html';
        return false;
    }
    return true;
}

// ============ API ============
async function apiFetch(endpoint, options = {}) {
    const token = getToken();
    const headers = {
        'Content-Type': 'application/json',
        ...options.headers,
        'Authorization': `Bearer ${token}`
    };
    
    const response = await fetch(`${API_BASE}${endpoint}`, {
        ...options,
        headers
    });
    
    if (response.status === 401) {
        logout();
        throw new Error('Sesi habis');
    }
    
    return response.json();
}

async function fetchEntries() {
    return await apiFetch('/entries');
}

async function deleteEntry(id) {
    return await apiFetch(`/entries/${id}`, {
        method: 'DELETE'
    });
}

// ============ UTILITIES ============
function formatDate(dateStr) {
    const date = new Date(dateStr);
    return date.toLocaleDateString('id-ID', {
        day: 'numeric',
        month: 'long',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

function getMoodEmoji(value) {
    const map = {
        5: '😊',
        4: '😌',
        3: '😐',
        2: '😢',
        1: '😡'
    };
    return map[value] || '😐';
}

function getMoodName(value) {
    const map = {
        5: 'Bahagia',
        4: 'Tenang',
        3: 'Biasa',
        2: 'Sedih',
        1: 'Marah'
    };
    return map[value] || 'Biasa';
}

function getMoodValue(emoji) {
    const map = {
        '😊': 5,
        '😌': 4,
        '😐': 3,
        '😢': 2,
        '😡': 1
    };
    return map[emoji] || 3;
}

// ============ RENDER ============
function renderHistory(entries) {
    const container = document.getElementById('historyList');
    const countEl = document.getElementById('historyCount');
    
    countEl.textContent = `${entries.length} entri`;
    
    if (entries.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <div class="empty-text">Belum ada catatan</div>
            </div>
        `;
        return;
    }
    
    container.innerHTML = entries.map(entry => {
        const moodValue = getMoodValue(entry.mood);
        const moodName = getMoodName(moodValue);
        
        return `
            <div class="history-item">
                <div class="history-emoji">${entry.mood || '😐'}</div>
                <div class="history-body">
                    <div class="history-top">
                        <span class="history-mood">${moodName}</span>
                        <span class="history-date">${formatDate(entry.created_at)}</span>
                    </div>
                    <div class="history-note">${entry.feeling_text || entry.note || 'Tidak ada catatan'}</div>
                    <button class="delete-btn" onclick="deleteEntryHandler(${entry.id})">🗑️ Hapus</button>
                </div>
            </div>
        `;
    }).join('');
}

// ============ DELETE ============
window.deleteEntryHandler = async function(id) {
    if (!confirm('Yakin mau hapus catatan ini?')) return;
    
    try {
        await deleteEntry(id);
        await loadHistory();
        showToast('✅ Catatan berhasil dihapus');
    } catch (error) {
        alert('Gagal menghapus: ' + error.message);
    }
};

// ============ TOAST ============
function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

// ============ LOAD ============
async function loadHistory() {
    try {
        const entries = await fetchEntries();
        renderHistory(entries);
        
        // Update streak
        const streak = calcStreak(entries);
        document.getElementById('streakVal').textContent = streak;
    } catch (error) {
        console.error('Failed to load history:', error);
    }
}

function calcStreak(entries) {
    if (!entries || entries.length === 0) return 0;
    
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    const entryDates = new Set();
    entries.forEach(e => {
        const date = new Date(e.created_at);
        date.setHours(0, 0, 0, 0);
        entryDates.add(date.getTime());
    });
    
    let streak = 0;
    let checkDate = new Date(today);
    
    while (entryDates.has(checkDate.getTime())) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
    }
    
    return streak;
}

// ============ INIT ============
async function init() {
    if (!await checkAuth()) return;
    await loadHistory();
}

init();
</script>
</body>
</html>
