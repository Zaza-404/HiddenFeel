<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiddenFeel · Statistik</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">
    <div class="header">
        <a href="today.html" class="logo">Hidden<span>Feel</span></a>
        <div class="header-actions">
            <div class="streak-pill">🔥 <span id="streakVal">0</span> hari</div>
            <button class="theme-btn" id="themeToggle" title="Ganti tema">🌙</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📊 Ringkasan</div>
        <div class="stats-row" style="margin-top:14px;">
            <div class="stat-card">
                <div class="stat-num" id="statTotal">0</div>
                <div class="stat-lbl">Total Entri</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statAvg">0</div>
                <div class="stat-lbl">Rata‑rata Mood</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statStreak">0</div>
                <div class="stat-lbl">Streak Hari</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📈 Tren 7 Hari</div>
        <canvas id="trendChart" height="200"></canvas>
    </div>

    <div class="card">
        <div class="card-title">🥧 Distribusi Mood</div>
        <canvas id="moodChart" height="200"></canvas>
    </div>

    <footer>Bukan alat diagnosis medis. Jaga kesehatan mentalmu 💚</footer>
</div>

<nav class="bottom-nav">
    <a href="today.html" class="nav-item">
        <span class="nav-icon">📝</span>Hari Ini
    </a>
    <a href="stats.html" class="nav-item active">
        <span class="nav-icon">📊</span>Statistik
    </a>
    <a href="history.html" class="nav-item">
        <span class="nav-icon">📜</span>Riwayat
    </a>
    <a href="calendar.html" class="nav-item">
        <span class="nav-icon">📅</span>Kalender
    </a>
    <a href="insight.html" class="nav-item">
        <span class="nav-icon">✦</span>AI
    </a>
</nav>

<script>
// ============ CONFIG ============
const API_BASE = 'http://localhost:3000/api';

// ============ AUTH ============
function getToken() {
    return localStorage.getItem('token');
}

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'login.html';
}

async function checkAuth() {
    const token = getToken();
    if (!token) {
        window.location.href = 'login.html';
        return false;
    }
    return true;
}

// ============ API ============
async function apiFetch(endpoint, options = {}) {
    const token = getToken();
    const headers = {
        'Content-Type': 'application/json',
        ...options.headers,
        'Authorization': `Bearer ${token}`
    };
    
    const response = await fetch(`${API_BASE}${endpoint}`, {
        ...options,
        headers
    });
    
    if (response.status === 401) {
        logout();
        throw new Error('Sesi habis');
    }
    
    return response.json();
}

async function getStats() {
    return await apiFetch('/stats');
}

async function fetchEntries() {
    return await apiFetch('/entries');
}

// ============ UTILITIES ============
function calcStreak(entries) {
    if (!entries || entries.length === 0) return 0;
    
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    const entryDates = new Set();
    entries.forEach(e => {
        const date = new Date(e.created_at);
        date.setHours(0, 0, 0, 0);
        entryDates.add(date.getTime());
    });
    
    let streak = 0;
    let checkDate = new Date(today);
    
    while (entryDates.has(checkDate.getTime())) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
    }
    
    return streak;
}

function getMoodValue(emoji) {
    const map = {
        '😊': 5,
        '😌': 4,
        '😐': 3,
        '😢': 2,
        '😡': 1
    };
    return map[emoji] || 3;
}

// ============ THEME ============
function initTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    }
    
    const themeBtn = document.getElementById('themeToggle');
    if (themeBtn) {
        themeBtn.textContent = document.documentElement.hasAttribute('data-theme') ? '☀️' : '🌙';
        themeBtn.addEventListener('click', () => {
            document.documentElement.toggleAttribute('data-theme');
            const isDark = document.documentElement.hasAttribute('data-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeBtn.textContent = isDark ? '☀️' : '🌙';
        });
    }
}

// ============ CHARTS ============
let trendChart = null;
let moodChart = null;

function getChartColors() {
    const isDark = document.documentElement.hasAttribute('data-theme');
    return {
        text: isDark ? '#f0e6dc' : '#2c2016',
        grid: isDark ? '#3a2e24' : '#e8ddd0'
    };
}

function renderTrendChart(data) {
    const ctx = document.getElementById('trendChart').getContext('2d');
    const colors = getChartColors();
    
    if (trendChart) trendChart.destroy();
    
    const labels = data.map(d => {
        const date = new Date(d.date);
        return date.toLocaleDateString('id-ID', { weekday: 'short' });
    });
    
    const values = data.map(d => d.value || 0);
    
    trendChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Mood',
                data: values,
                borderColor: '#d4825a',
                backgroundColor: 'rgba(212,130,90,0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    min: 0,
                    max: 6,
                    ticks: { color: colors.text }
                },
                x: {
                    ticks: { color: colors.text }
                }
            }
        }
    });
}

function renderMoodChart(data) {
    const ctx = document.getElementById('moodChart').getContext('2d');
    const colors = getChartColors();
    
    if (moodChart) moodChart.destroy();
    
    const moodEmojis = ['😊', '😌', '😐', '😢', '😡'];
    const moodNames = ['Bahagia', 'Tenang', 'Biasa', 'Sedih', 'Marah'];
    const moodColors = ['#a8c96a', '#a8c5a0', '#c0b898', '#d0a070', '#c08080'];
    
    const values = moodEmojis.map(emoji => data[emoji] || 0);
    
    moodChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: moodNames.map((name, i) => `${moodEmojis[i]} ${name}`),
            datasets: [{
                data: values,
                backgroundColor: moodColors,
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { color: colors.text, padding: 15 }
                }
            }
        }
    });
}

// ============ LOAD DATA ============
async function loadStats() {
    try {
        const stats = await getStats();
        const entries = await fetchEntries();
        const streak = calcStreak(entries);
        
        document.getElementById('statTotal').textContent = stats.total || 0;
        document.getElementById('statAvg').textContent = stats.avg_sentiment ? 
            (stats.avg_sentiment * 5).toFixed(1) : '0';
        document.getElementById('statStreak').textContent = streak;
        document.getElementById('streakVal').textContent = streak;
        
        // Prepare trend data
        const trendData = stats.daily_stats || [];
        renderTrendChart(trendData);
        
        // Prepare mood distribution
        const moodCount = stats.mood_count || {};
        renderMoodChart(moodCount);
        
    } catch (error) {
        console.error('Failed to load stats:', error);
    }
}

// ============ INIT ============
async function init() {
    if (!await checkAuth()) return;
    initTheme();
    await loadStats();
}

init();
</script>
</body>
</html>
