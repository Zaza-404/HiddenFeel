<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiddenFeel · Hari Ini</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
    <div class="header">
        <a href="today.html" class="logo">Hidden<span>Feel</span></a>
        <div class="header-actions">
            <div class="streak-pill">🔥 <span id="streakVal">0</span> hari</div>
            <button class="theme-btn" id="themeToggle" title="Ganti tema">🌙</button>
        </div>
    </div>

    <div class="greeting-banner" id="greetingBanner">
        <div class="greeting-date" id="greetingDate"></div>
        <div class="greeting-text" id="greetingText">Selamat pagi!</div>
        <div class="greeting-sub" id="greetingChecked"></div>
    </div>

    <div class="card">
        <div class="section-label">Perasaanmu hari ini</div>
        <div class="mood-grid" id="moodGrid"></div>
        <div class="intensity-row" id="intensityRow" style="display:none;">
            <span class="intensity-label">Intensitas</span>
            <input type="range" class="intensity-slider" id="intensitySlider" min="1" max="5" value="3">
            <span class="intensity-val" id="intensityVal">3</span>
        </div>
    </div>

    <div class="card">
        <div class="section-label">Energi fisik</div>
        <div class="energy-row" id="energyRow"></div>
    </div>

    <div class="card">
        <div class="section-label">Apa yang mempengaruhimu?</div>
        <div class="triggers-wrap" id="triggersGrid"></div>
    </div>

    <div class="card">
        <div class="section-label">Refleksi hari ini</div>
        <textarea id="noteInput" rows="3" placeholder="Apa yang ada di pikiranmu? Ceritakan saja…"></textarea>
    </div>

    <button class="btn-save" id="saveBtn">✨ Simpan Hari Ini</button>

    <div id="insightBox" style="display:none;" class="card">
        <div class="card-title">✦ Refleksi AI</div>
        <div id="insightContent"></div>
    </div>

    <footer>Bukan alat diagnosis medis. Jaga kesehatan mentalmu 💚</footer>
</div>

<nav class="bottom-nav">
    <a href="today.html" class="nav-item active">
        <span class="nav-icon">📝</span>Hari Ini
    </a>
    <a href="stats.html" class="nav-item">
        <span class="nav-icon">📊</span>Statistik
    </a>
    <a href="history.html" class="nav-item">
        <span class="nav-icon">📜</span>Riwayat
    </a>
    <a href="calendar.html" class="nav-item">
        <span class="nav-icon">📅</span>Kalender
    </a>
    <a href="insight.html" class="nav-item">
        <span class="nav-icon">✦</span>AI
    </a>
</nav>

<script src="js/common.js"></script>
<script>
// Check authentication before loading page
(async function() {
    const isAuthed = await checkAuth();
    if (!isAuthed) return;
    addLogoutButton();
})();
</script>
<script src="js/today.js"></script>
</body>
</html>
